<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MixLand Shop</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f4f6f9;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:white;
}

.logo { height:40px; }

/* SEARCH */
.topbar {
  display:flex;
  gap:10px;
  padding:10px;
}

.topbar input, .topbar select {
  padding:8px;
  flex:1;
}

/* PRODUCTS */
.products {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:10px;
  padding:10px;
}

.product {
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.img {
  height:100px;
  background:#ddd;
  margin-bottom:10px;
  border-radius:8px;
}

button {
  background:#ff6600;
  color:white;
  border:none;
  padding:6px;
  border-radius:5px;
  cursor:pointer;
}

/* CART BUTTON */
.cart-btn {
  position: fixed;
  right: 15px;
  bottom: 20px;
  background: #ff6600;
  color: white;
  font-size: 22px;
  padding: 12px 15px;
  border-radius: 50%;
  cursor: pointer;
  z-index: 1000;
}

/* CART PANEL */
.cart {
  position: fixed;
  right: -100%;
  top: 0;
  width: 300px;
  height: 100%;
  background: white;
  padding: 15px;
  transition: 0.3s;
  box-shadow: -5px 0 20px rgba(0,0,0,0.2);
  z-index: 999;
}

.cart.open {
  right: 0;
}

.cart-item {
  font-size: 14px;
  margin-bottom: 5px;
}

/* CHECKOUT */
.checkout {
  display:none;
  position:fixed;
  top:10%;
  left:50%;
  transform:translateX(-50%);
  background:white;
  padding:20px;
  width:300px;
  border-radius:10px;
}
</style>

</head>

<body>

<header>
  <img src="mixlandlogo.PNG" class="logo">
  <h3>Shop</h3>
</header>

<div class="topbar">
  <input id="search" placeholder="Pretraži...">
  <select id="filter">
    <option value="all">Sve</option>
    <option value="dom">Domaćinstvo</option>
    <option value="dekor">Dekoracija</option>
    <option value="alat">Alati</option>
  </select>
</div>

<div class="products" id="products"></div>

<!-- CART BUTTON -->
<div class="cart-btn" onclick="toggleCart()">
  🛒 <span id="cart-count">0</span>
</div>

<!-- CART PANEL -->
<div class="cart" id="cartBox">
  <h3>Korpa</h3>

  <div id="cart-items"></div>

  <div>
    Artikli: <span id="subtotal">0</span>€<br>
    Dostava: <span id="shipping">0</span>€<br>
    <b>Ukupno: <span id="total">0</span>€</b>
  </div>

  <br>
  <button onclick="openCheckout()">Checkout</button>
</div>

<!-- CHECKOUT -->
<div class="checkout" id="checkoutBox">
  <input id="ime" placeholder="Ime"><br><br>
  <input id="telefon" placeholder="Telefon"><br><br>
  <textarea id="adresa" placeholder="Adresa"></textarea><br><br>

  <button onclick="sendOrder()">Pošalji</button>
</div>

<script>

/* DATA */
let products = [];
let cart = [];

/* GENERATE PRODUCTS */
for(let i=1;i<=100;i++){
  let cat = (i%3==0) ? "dom" : (i%3==1) ? "dekor" : "alat";

  products.push({
    name: "Artikal " + i,
    price: 1,
    category: cat
  });
}

/* RENDER PRODUCTS */
function renderProducts(){
  let search = document.getElementById("search").value.toLowerCase();
  let filter = document.getElementById("filter").value;

  let container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach((p,i)=>{
    if((filter=="all" || p.category==filter) && p.name.toLowerCase().includes(search)){

      let div = document.createElement("div");
      div.className = "product";

      div.innerHTML = `
        <div class="img"></div>
        <h4>${p.name}</h4>
        <p>1.00€</p>
        <button onclick="addToCart(${i})">Dodaj</button>
      `;

      container.appendChild(div);
    }
  });
}

/* ADD */
function addToCart(i){
  cart.push(products[i]);
  renderCart();
}

/* REMOVE */
function removeItem(i){
  cart.splice(i,1);
  renderCart();
}

/* CART RENDER */
function renderCart(){
  let container = document.getElementById("cart-items");
  container.innerHTML = "";

  let subtotal = 0;

  cart.forEach((item,index)=>{
    subtotal += item.price;

    let div = document.createElement("div");
    div.className = "cart-item";

    div.innerHTML = `
      ${item.name} - 1€
      <span onclick="removeItem(${index})" style="color:red;cursor:pointer;"> ✖</span>
    `;

    container.appendChild(div);
  });

  let shipping = subtotal >= 50 ? 0 : 5;
  let total = subtotal + shipping;

  document.getElementById("subtotal").innerText = subtotal;
  document.getElementById("shipping").innerText = shipping;
  document.getElementById("total").innerText = total;
  document.getElementById("cart-count").innerText = cart.length;
}

/* TOGGLE CART */
function toggleCart(){
  document.getElementById("cartBox").classList.toggle("open");
}

/* CHECKOUT */
function openCheckout(){
  document.getElementById("checkoutBox").style.display = "block";
}

/* WHATSAPP */
function sendOrder(){
  let ime = document.getElementById("ime").value;
  let tel = document.getElementById("telefon").value;
  let adr = document.getElementById("adresa").value;

  if(!ime || !tel || !adr){
    alert("Popuni sva polja!");
    return;
  }

  let msg = "Nova narudžba:%0A";

  cart.forEach(item=>{
    msg += item.name + " - 1€%0A";
  });

  msg += "%0A" + ime + " | " + tel + "%0A" + adr;

  window.open("https://wa.me/38762154837?text=" + msg);
}

/* EVENTS */
document.getElementById("search").addEventListener("input", renderProducts);
document.getElementById("filter").addEventListener("change", renderProducts);

/* INIT */
renderProducts();

</script>

</body>
</html>
