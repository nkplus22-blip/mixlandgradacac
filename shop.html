<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MixLand Shop</title>

<style>
body{margin:0;font-family:sans-serif;background:#f4f6f9;transition:.3s}
.dark{background:#1e1e1e;color:white}
header{display:flex;justify-content:space-between;padding:15px;background:white}
.dark header{background:#2c2c2c}
.logo{height:40px}
.topbar{display:flex;gap:10px;padding:10px}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;padding:10px}
.product{background:white;padding:10px;border-radius:10px;text-align:center}
.dark .product{background:#2c2c2c}
.img-placeholder{height:100px;background:#ddd;margin-bottom:10px}
.badge{background:red;color:white;padding:2px 5px;font-size:10px}
.cart{position:fixed;right:0;top:0;width:330px;height:100%;background:white;padding:10px;overflow:auto}
.dark .cart{background:#2c2c2c}
button{background:#ff6600;color:white;border:none;padding:5px;cursor:pointer}
.checkout,.invoice{display:none;position:fixed;top:5%;left:50%;transform:translateX(-50%);background:white;padding:20px;width:300px}
.dark .checkout,.dark .invoice{background:#2c2c2c}
</style>
</head>

<body>

<header>
<img src="mixlandlogo.PNG" class="logo">
<div>
<button onclick="toggleDark()">🌙</button>
<select onchange="setLang(this.value)">
<option value="bs">BS</option>
<option value="en">EN</option>
<option value="de">DE</option>
</select>
</div>
</header>

<div class="topbar">
<input id="search" placeholder="Search">
<select id="filter">
<option value="all">All</option>
<option value="dom">Dom</option>
<option value="dekor">Dekor</option>
<option value="alat">Alat</option>
</select>
</div>

<div class="products" id="products"></div>

<div class="cart">
<h3>Korpa</h3>
<div id="cart-items"></div>
<div>
Artikli: <span id="subtotal">0</span>€<br>
Dostava: <span id="shipping">0</span>€<br>
Popust: <span id="discount">0</span>€<br>
<b>Ukupno: <span id="total">0</span>€</b>
</div>
<button onclick="openCheckout()">Checkout</button>
</div>

<div class="checkout" id="checkoutBox">
<input id="ime" placeholder="Ime">
<input id="telefon" placeholder="Telefon">
<textarea id="adresa"></textarea>
<select id="placanje">
<option>PayPal</option>
<option>Pouzećem</option>
<option>Uplata</option>
</select>
<button onclick="previewInvoice()">Pregled</button>
</div>

<div class="invoice" id="invoiceBox">
<h3>Račun</h3>
<div id="invoiceText"></div>
<button onclick="sendOrder()">Pošalji WhatsApp</button>
</div>

<script>
let products=[],cart=JSON.parse(localStorage.getItem("cart"))||[],lang="bs";

/* PRODUCTS */
for(let i=1;i<=100;i++){
let cat=i%3==0?"dom":i%3==1?"dekor":"alat";
products.push({name:"Artikal "+i,price:1,category:cat,action:i%5==0});
}

/* RENDER PRODUCTS */
function renderProducts(){
let s=search.value.toLowerCase(),f=filter.value;
productsDiv.innerHTML="";
products.forEach((p,i)=>{
if((f=="all"||p.category==f)&&p.name.toLowerCase().includes(s)){
productsDiv.innerHTML+=`
<div class="product">
${p.action?'<div class="badge">AKCIJA</div>':''}
<div class="img-placeholder"></div>
<h4>${p.name}</h4>
<p>1.00€</p>
<button onclick="add(${i})">+</button>
</div>`;
}});
}

/* CART */
function add(i){
let f=cart.find(x=>x.name==products[i].name);
if(f)f.qty++;else cart.push({...products[i],qty:1});
save();
}

function save(){
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
}

function renderCart(){
cartItems.innerHTML="";
let subtotal=0;
cart.forEach((i,idx)=>{
subtotal+=i.price*i.qty;
cartItems.innerHTML+=`${i.name}(${i.qty}) <button onclick="change(${idx},-1)">-</button><button onclick="change(${idx},1)">+</button><br>`;
});
let shipping=subtotal>=50?0:5;
let discount=subtotal>=100?subtotal*0.1:0;
let total=subtotal+shipping-discount;

subtotalEl.innerText=subtotal.toFixed(2);
shippingEl.innerText=shipping;
discountEl.innerText=discount.toFixed(2);
totalEl.innerText=total.toFixed(2);
}

function change(i,d){
cart[i].qty+=d;
if(cart[i].qty<=0)cart.splice(i,1);
save();
}

/* CHECKOUT */
function openCheckout(){checkoutBox.style.display="block";}

/* INVOICE */
function previewInvoice(){
let txt="";
let subtotal=0;
cart.forEach(i=>{
txt+=i.name+" x"+i.qty+"<br>";
subtotal+=i.price*i.qty;
});
let shipping=subtotal>=50?0:5;
let discount=subtotal>=100?subtotal*0.1:0;
let total=subtotal+shipping-discount;

txt+=`<hr>Ukupno: ${total.toFixed(2)}€`;

invoiceText.innerHTML=txt;
invoiceBox.style.display="block";
}

/* WHATSAPP */
function sendOrder(){
let msg="MixLand narudžba:%0A";
cart.forEach(i=>msg+=i.name+" x"+i.qty+"%0A");
window.open("https://wa.me/38762154837?text="+msg);
}

/* DARK */
function toggleDark(){document.body.classList.toggle("dark");}

/* LANG */
function setLang(l){lang=l;alert("Jezik promijenjen");}

/* INIT */
renderProducts();renderCart();
</script>

</body>
</html>
